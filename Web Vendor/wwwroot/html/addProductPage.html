<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add/Edit Product</title>
    <link rel="stylesheet" href="/css/addProductPage.css">
</head>
<body>
    <div class="modal-container">
        <header class="modal-header">
            <div class="logo-section">
                <span class="logo-icon">🛒</span>
                <span class="logo-text">Shop Manager</span>
            </div>
            <button class="close-btn">&times;</button>
        </header>

        <main class="modal-content">
            <div class="form-title">
                <h1>Add/Edit Product</h1>
                <p>Update your inventory details and keep your shop up to date.</p>
            </div>

            <form class="product-form">
                <div class="form-group">
                    <label>PRODUCT NAME</label>
                    <input type="text" placeholder="e.g. Handmade Ceramic Vase">
                </div>

                <div class="form-group">
                    <label>PRICE</label>
                    <div class="input-with-icon">
                        <span class="currency-icon">💵</span>
                        <input type="number" placeholder="0.00" step="0.01">
                    </div>
                </div>

                <div class="form-group">
                    <label>DESCRIPTION</label>
                    <textarea placeholder="Describe the materials, dimensions, and unique features of your product..."></textarea>
                </div>

                <div class="form-group">
                    <label>PRODUCT IMAGE</label>
                    <div class="upload-area">
                        <div class="upload-icon">☁️</div>
                        <p><strong>Click to upload</strong> or drag and drop</p>
                        <span>PNG, JPG or WEBP (Max. 5MB)</span>
                        <input type="file" hidden id="fileInput">
                    </div>
                </div>

                <button type="button" class="submit-btn" onclick="window.location.href='manageProductsPage.html'">Save Product</button>
            </form>
        </main>
    </div>
</body>
</html>
