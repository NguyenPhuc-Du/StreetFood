<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yêu cầu âm thanh</title>
    <link rel="stylesheet" href="/css/vendorPro.css?v=20260402a">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-icon">🍜</div>
                <div>
                    <div style="font-weight:800;">StreetFood Vendor</div>
                    <div class="muted" style="font-size:12px;">Quản lý cửa hàng</div>
                </div>
            </div>
            <nav class="menu">
                <a href="dashboardShopPage.html">Thông tin cửa hàng</a>
                <a href="manageProductsPage.html">Quản lý món ăn</a>
                <a class="active" href="requestScriptPage.html">Yêu cầu âm thanh</a>
            </nav>
            <div class="sidebar-footer">
                <a class="btn-logout" href="#" onclick="window.VendorLogout?.(); return false;">Đăng xuất</a>
            </div>
        </aside>

        <main class="content">
            <div class="topbar">
                <div class="title">
                    <h1>Gửi yêu cầu âm thanh</h1>
                    <p>Chọn gửi kịch bản (admin duyệt → Azure TTS) hoặc tải sẵn 5 file (admin chỉ duyệt, không TTS).</p>
                </div>
            </div>

            <div class="card stack">
                <div class="field">
                    <label>POI</label>
                    <select id="poiSelect"></select>
                </div>
                <div class="field">
                    <label>Cách gửi</label>
                    <div style="display:flex;flex-direction:column;gap:8px;">
                        <label style="font-weight:600;cursor:pointer;"><input type="radio" name="submitMode" id="modeScript" value="script" checked> Kịch bản — một ngôn ngữ nguồn, hệ thống dịch &amp; TTS sau khi admin duyệt</label>
                        <label style="font-weight:600;cursor:pointer;"><input type="radio" name="submitMode" id="modeBundle" value="bundle"> Gói 5 file âm thanh — vi, en, cn, ja, ko (mỗi file tối đa ~12MB)</label>
                    </div>
                </div>
                <div id="scriptBlock">
                    <div class="field">
                        <label>Ngôn ngữ nguồn</label>
                        <select id="languageSelect">
                            <option value="vi" selected>Tiếng Việt (vi)</option>
                            <option value="en">Tiếng Anh (en)</option>
                            <option value="cn">Tiếng Trung (cn)</option>
                            <option value="ja">Tiếng Nhật (ja)</option>
                            <option value="ko">Tiếng Hàn (ko)</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Nội dung kịch bản mới</label>
                        <textarea id="scriptText" placeholder="Nhập nội dung kịch bản để tạo âm thanh mới..."></textarea>
                    </div>
                </div>
                <div id="bundleBlock" style="display:none;">
                    <div class="field"><label>vi — Tiếng Việt</label><input type="file" id="fVi" accept="audio/*,.mp3,.wav,.webm,.m4a,.ogg"></div>
                    <div class="field"><label>en — English</label><input type="file" id="fEn" accept="audio/*,.mp3,.wav,.webm,.m4a,.ogg"></div>
                    <div class="field"><label>cn — 中文</label><input type="file" id="fCn" accept="audio/*,.mp3,.wav,.webm,.m4a,.ogg"></div>
                    <div class="field"><label>ja — 日本語</label><input type="file" id="fJa" accept="audio/*,.mp3,.wav,.webm,.m4a,.ogg"></div>
                    <div class="field"><label>ko — 한국어</label><input type="file" id="fKo" accept="audio/*,.mp3,.wav,.webm,.m4a,.ogg"></div>
                </div>
                <button id="sendBtn" class="btn btn-primary" type="button">Gửi yêu cầu</button>
                <p class="muted" id="msg"></p>
            </div>
        </main>
    </div>

    <script src="/config.js"></script>
    <script src="/js/logout.js"></script>
    <script src="/js/vendor-api.js?v=20260402b"></script>
    <script>
        (async function () {
            const poiSelect = document.getElementById('poiSelect');
            const msg = document.getElementById('msg');
            const scriptBlock = document.getElementById('scriptBlock');
            const bundleBlock = document.getElementById('bundleBlock');
            const modeScript = document.getElementById('modeScript');
            const modeBundle = document.getElementById('modeBundle');

            function syncMode() {
                const bundle = modeBundle.checked;
                scriptBlock.style.display = bundle ? 'none' : '';
                bundleBlock.style.display = bundle ? '' : 'none';
            }
            modeScript.addEventListener('change', syncMode);
            modeBundle.addEventListener('change', syncMode);
            syncMode();

            try {
                const pois = await window.VendorAPI.listPois();
                poiSelect.innerHTML = (pois || []).map(p => {
                    const id = p.poiId ?? p.PoiId;
                    const name = p.poiName ?? p.PoiName ?? ('POI ' + id);
                    return '<option value="' + id + '">' + name + '</option>';
                }).join('') || '<option value="">(không có POI)</option>';
            } catch (err) {
                msg.textContent = err?.message || String(err);
                return;
            }

            document.getElementById('sendBtn').onclick = async function () {
                msg.textContent = '';
                const poiId = parseInt(poiSelect.value, 10);
                if (!Number.isFinite(poiId) || poiId <= 0) {
                    msg.textContent = 'Chọn POI hợp lệ.';
                    return;
                }
                try {
                    if (modeBundle.checked) {
                        const files = {
                            vi: document.getElementById('fVi').files[0],
                            en: document.getElementById('fEn').files[0],
                            cn: document.getElementById('fCn').files[0],
                            ja: document.getElementById('fJa').files[0],
                            ko: document.getElementById('fKo').files[0]
                        };
                        for (const k of Object.keys(files)) {
                            if (!files[k]) {
                                msg.textContent = 'Thiếu file cho ngôn ngữ: ' + k + '.';
                                return;
                            }
                        }
                        msg.textContent = 'Đang tải 5 file lên...';
                        await window.VendorAPI.submitAudioBundle(poiId, files);
                        msg.textContent = 'Đã gửi gói âm thanh. Chờ admin phê duyệt.';
                        ['fVi','fEn','fCn','fJa','fKo'].forEach(id => { document.getElementById(id).value = ''; });
                    } else {
                        const lang = document.getElementById('languageSelect').value;
                        const text = document.getElementById('scriptText').value.trim();
                        if (!text) {
                            msg.textContent = 'Nội dung kịch bản là bắt buộc.';
                            return;
                        }
                        msg.textContent = 'Đang gửi yêu cầu...';
                        await window.VendorAPI.submitScript(poiId, text, lang);
                        msg.textContent = 'Gửi kịch bản thành công. Đang chờ admin phê duyệt.';
                        document.getElementById('scriptText').value = '';
                    }
                } catch (err) {
                    msg.textContent = err?.message || String(err);
                }
            };
        })();
    </script>
</body>
</html>
