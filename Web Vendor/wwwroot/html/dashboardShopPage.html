<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý quán - Thông tin cửa hàng</title>
    <link rel="stylesheet" href="/css/vendorPro.css?v=20260403b">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-icon">🍜</div>
                <div>
                    <div style="font-weight:800;">StreetFood Vendor</div>
                    <div class="muted" style="font-size:12px;">Quản lý cửa hàng</div>
                </div>
            </div>
            <nav class="menu">
                <a class="active" href="dashboardShopPage.html">Thông tin cửa hàng</a>
                <a href="manageProductsPage.html">Quản lý món ăn</a>
                <a href="requestScriptPage.html">Yêu cầu âm thanh</a>
            </nav>
            <div class="sidebar-footer">
                <a class="btn-logout" href="#" onclick="window.VendorLogout?.(); return false;">Đăng xuất</a>
            </div>
        </aside>

        <main class="content">
            <div class="topbar">
                <div class="title">
                    <h1>Thông tin cửa hàng</h1>
                    <p id="subtitle">Đang tải dữ liệu từ hệ thống...</p>
                </div>
            </div>

            <div class="stack">
                <div class="card stack" style="padding:12px;">
                    <div class="field" style="margin-bottom:0;">
                        <label>Ảnh cửa hàng</label>
                        <img id="shopImagePreview" alt="Ảnh cửa hàng"
                             style="width:100%;height:320px;object-fit:contain;border-radius:12px;background:#ffffff;border:1px solid var(--line);" />
                    </div>
                </div>

                <div class="card stack" id="shopDetailsCard">
                    <div class="field">
                        <label>Tên cửa hàng</label>
                        <input id="storeNameInput" type="text" readonly>
                    </div>

                    <input id="storeImageInput" type="hidden" />
                    <input id="shopImageFileInput" type="file" accept="image/png,image/jpeg,image/webp" style="display:none;" />
                    <div class="field">
                        <label>Ảnh cửa hàng (chọn từ máy tính)</label>
                        <div class="image-url-row">
                            <input id="storeImageDisplayInput" type="text" placeholder="Chưa chọn ảnh mới" readonly />
                            <button id="btnPickImage" class="btn btn-outline" type="button" disabled>Chọn ảnh</button>
                        </div>
                        <p class="muted" style="font-size:12px;margin-top:6px;">Chỉ tải file JPG, PNG hoặc WEBP (tối đa 5MB). Không nhập URL.</p>
                    </div>

                    <div class="grid-2">
                        <div class="field">
                            <label>Giờ mở cửa</label>
                            <input id="openingHoursInput" type="text" placeholder="07:00 - 22:00" readonly
                                   title="Định dạng: HH:mm - HH:mm" autocomplete="off">
                        </div>
                        <div class="field">
                            <label>Số điện thoại</label>
                            <input id="phoneInput" type="tel" inputmode="numeric" placeholder="0912345678 hoặc +84912345678" readonly
                                   title="Số di động VN: 0xxxxxxxxx hoặc +84xxxxxxxxx" autocomplete="tel">
                        </div>
                    </div>
                    <div class="field">
                        <label>Email (tài khoản đăng nhập)</label>
                        <input id="emailInput" type="email" inputmode="email" placeholder="ten@gmail.com" readonly autocomplete="email">
                    </div>

                    <button id="saveBtn" class="btn btn-save-blue" type="button" disabled style="display:none;">
                        Lưu thông tin cửa hàng
                    </button>
                    <p class="muted" id="saveMsg" style="display:block;">Chưa có thay đổi.</p>
                    <button id="editToggleBtn" class="btn btn-primary" type="button">Thay đổi thông tin</button>
                </div>
            </div>
        </main>
    </div>

    <script src="/config.js"></script>
    <script src="/js/logout.js"></script>
    <script src="/js/vendor-api.js?v=20260403b"></script>
    <script>
        (async function () {
            const subtitle = document.getElementById('subtitle');
            const editToggleBtn = document.getElementById('editToggleBtn');
            const saveBtn = document.getElementById('saveBtn');
            const saveMsg = document.getElementById('saveMsg');

            const shopImagePreview = document.getElementById('shopImagePreview');

            const storeNameInput = document.getElementById('storeNameInput');
            const storeImageInput = document.getElementById('storeImageInput');
            const openingHoursInput = document.getElementById('openingHoursInput');
            const phoneInput = document.getElementById('phoneInput');
            const emailInput = document.getElementById('emailInput');
            const storeImageDisplayInput = document.getElementById('storeImageDisplayInput');
            const btnPickImage = document.getElementById('btnPickImage');
            const shopImageFileInput = document.getElementById('shopImageFileInput');

            let serverImageUrl = '';
            let pendingFile = null;
            let previewBlobUrl = '';
            let snapshot = { openingHours: '', phone: '', email: '', imageUrl: '' };

            let poiId = null;
            let editMode = false;

            function shortenImageUrl(url) {
                if (!url) return '';
                try {
                    const u = new URL(url);
                    const last = (u.pathname || '').split('/').filter(Boolean).pop();
                    return last || u.hostname;
                } catch {
                    const s = String(url);
                    return s.length > 40 ? s.slice(0, 18) + '...' + s.slice(-14) : s;
                }
            }

            function setImageRow(url, displayLabel) {
                serverImageUrl = (url || '').toString().trim();
                if (storeImageInput) storeImageInput.value = serverImageUrl;
                if (storeImageDisplayInput) storeImageDisplayInput.value = displayLabel || (serverImageUrl ? shortenImageUrl(serverImageUrl) : 'Chưa có ảnh trên hệ thống');
                if (shopImagePreview) shopImagePreview.src = serverImageUrl || '';
            }

            function clearPreviewBlob() {
                if (previewBlobUrl) {
                    try { URL.revokeObjectURL(previewBlobUrl); } catch (e) { /* ignore */ }
                    previewBlobUrl = '';
                }
            }

            function setEditMode(enabled, restoreFromSnapshot) {
                if (enabled) {
                    snapshot = {
                        openingHours: openingHoursInput ? openingHoursInput.value : '',
                        phone: phoneInput ? phoneInput.value : '',
                        email: emailInput ? emailInput.value : '',
                        imageUrl: serverImageUrl
                    };
                    pendingFile = null;
                } else if (editMode && restoreFromSnapshot) {
                    if (openingHoursInput) openingHoursInput.value = snapshot.openingHours;
                    if (phoneInput) phoneInput.value = snapshot.phone;
                    if (emailInput) emailInput.value = snapshot.email;
                    pendingFile = null;
                    clearPreviewBlob();
                    serverImageUrl = snapshot.imageUrl;
                    setImageRow(serverImageUrl, serverImageUrl ? shortenImageUrl(serverImageUrl) : 'Chưa có ảnh trên hệ thống');
                }

                editMode = enabled;
                if (editToggleBtn) {
                    editToggleBtn.textContent = enabled ? 'Hủy chỉnh sửa' : 'Thay đổi thông tin';
                }

                const readonly = !enabled;
                if (openingHoursInput) openingHoursInput.readOnly = readonly;
                if (phoneInput) phoneInput.readOnly = readonly;
                if (emailInput) emailInput.readOnly = readonly;
                if (btnPickImage) btnPickImage.disabled = !enabled;

                if (saveBtn) {
                    saveBtn.style.display = enabled ? 'flex' : 'none';
                    saveBtn.disabled = !enabled;
                }

                if (enabled && saveMsg) {
                    saveMsg.textContent = 'Sẵn sàng để lưu thay đổi.';
                }
            }

            function isValidVnPhone(s) {
                const t = (s || '').trim().replace(/\s+/g, '').replace(/-/g, '');
                if (!t) return true;
                return /^(?:\+84|0)(3|5|7|8|9)[0-9]{8}$/.test(t);
            }

            function isValidEmail(s) {
                if (!s || !String(s).trim()) return true;
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(s).trim());
            }

            try {
                const poi = await window.VendorAPI.getDefaultPoi();
                poiId = poi.poiId ?? poi.PoiId;
                poiId = Number(poiId);
                if (!Number.isFinite(poiId) || poiId <= 0) {
                    throw new Error('POIId không hợp lệ.');
                }

                const poiName = poi.poiName ?? poi.PoiName ?? '';
                const address = poi.address ?? poi.Address ?? '';
                const imageUrl = poi.imageUrl ?? poi.ImageUrl ?? '';
                const opening = poi.openingHours ?? poi.OpeningHours ?? '';
                const phone = poi.phone ?? poi.Phone ?? '';
                const email = poi.email ?? poi.Email ?? '';

                if (subtitle) subtitle.textContent = (poiName || 'Cửa hàng') + (address ? ' • ' + address : '');

                if (storeNameInput) storeNameInput.value = poiName;
                if (openingHoursInput) openingHoursInput.value = opening;
                if (phoneInput) phoneInput.value = phone;
                if (emailInput) emailInput.value = email;
                pendingFile = null;
                setImageRow(imageUrl, imageUrl ? shortenImageUrl(imageUrl) : 'Chưa có ảnh trên hệ thống');

                if (editToggleBtn) {
                    editToggleBtn.onclick = () => {
                        const next = !editMode;
                        setEditMode(next, next === false && editMode === true);
                    };
                }

                if (btnPickImage) {
                    btnPickImage.onclick = () => {
                        if (!editMode) return;
                        if (shopImageFileInput) shopImageFileInput.click();
                    };
                }

                if (shopImageFileInput) {
                    shopImageFileInput.onchange = () => {
                        const file = shopImageFileInput.files && shopImageFileInput.files[0];
                        if (!file) return;

                        const maxSizeBytes = 5 * 1024 * 1024;
                        const allowed = ['image/png', 'image/jpeg', 'image/webp'];
                        const ext = (file.name || '').toLowerCase();
                        const isAllowedByType = allowed.includes(file.type);
                        const isAllowedByExt = ext.endsWith('.png') || ext.endsWith('.jpg') || ext.endsWith('.jpeg') || ext.endsWith('.webp');

                        if (!isAllowedByType && !isAllowedByExt) {
                            alert('Chỉ hỗ trợ PNG/JPG/WEBP.');
                            return;
                        }
                        if (file.size > maxSizeBytes) {
                            alert('Dung lượng ảnh tối đa 5MB.');
                            return;
                        }

                        pendingFile = file;
                        clearPreviewBlob();
                        previewBlobUrl = URL.createObjectURL(file);
                        if (shopImagePreview) shopImagePreview.src = previewBlobUrl;
                        if (storeImageDisplayInput) storeImageDisplayInput.value = file.name;
                        shopImageFileInput.value = '';
                    };
                }

                if (saveBtn) {
                    saveBtn.onclick = async function () {
                        if (!poiId) return;
                        saveBtn.disabled = true;
                        if (saveMsg) saveMsg.textContent = 'Đang lưu...';
                        try {
                            const rawHours = (openingHoursInput?.value ?? '').toString().trim();
                            const m = rawHours.match(/^(\d{2}:\d{2})\s*-\s*(\d{2}:\d{2})$/);
                            if (!m) {
                                saveMsg.textContent = 'Giờ mở cửa phải đúng dạng HH:mm - HH:mm (ví dụ: 07:00 - 22:00).';
                                saveBtn.disabled = false;
                                return;
                            }
                            const from = m[1];
                            const to = m[2];
                            const toMinutes = (t) => {
                                const [hh, mm] = t.split(':').map(Number);
                                return hh * 60 + mm;
                            };
                            if (toMinutes(from) >= toMinutes(to)) {
                                saveMsg.textContent = 'Giờ mở cửa: giờ bắt đầu phải nhỏ hơn giờ kết thúc.';
                                saveBtn.disabled = false;
                                return;
                            }

                            const phoneRaw = (phoneInput?.value ?? '').trim();
                            if (!isValidVnPhone(phoneRaw)) {
                                saveMsg.textContent = 'Số điện thoại không đúng (VD: 0912345678 hoặc +84912345678).';
                                saveBtn.disabled = false;
                                return;
                            }
                            const emailRaw = (emailInput?.value ?? '').trim();
                            if (!isValidEmail(emailRaw)) {
                                saveMsg.textContent = 'Email không đúng định dạng.';
                                saveBtn.disabled = false;
                                return;
                            }

                            let imageUrlFinal = serverImageUrl;
                            if (pendingFile) {
                                if (saveMsg) saveMsg.textContent = 'Đang tải ảnh lên máy chủ...';
                                imageUrlFinal = await window.VendorAPI.uploadShopImage(pendingFile);
                                pendingFile = null;
                                clearPreviewBlob();
                            }

                            if (saveMsg) saveMsg.textContent = 'Đang lưu thông tin...';
                            await window.VendorAPI.updateShopDetails(
                                poiId,
                                openingHoursInput?.value ?? '',
                                phoneInput?.value ?? '',
                                emailRaw,
                                imageUrlFinal
                            );
                            serverImageUrl = imageUrlFinal;
                            setImageRow(serverImageUrl, serverImageUrl ? shortenImageUrl(serverImageUrl) : 'Chưa có ảnh trên hệ thống');
                            if (saveMsg) saveMsg.textContent = 'Lưu thành công.';
                            setEditMode(false, false);
                        } catch (err) {
                            if (saveMsg) saveMsg.textContent = err?.message || String(err);
                            saveBtn.disabled = false;
                        }
                    };
                }

                setEditMode(false, false);
            } catch (err) {
                if (subtitle) subtitle.textContent = err?.message || String(err);
                if (saveMsg) saveMsg.textContent = 'Không thể tải thông tin cửa hàng.';
            }
        })();
    </script>
</body>
</html>
