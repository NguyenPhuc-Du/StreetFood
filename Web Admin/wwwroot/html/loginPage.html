<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập | StreetFood</title>
    <link rel="stylesheet" href="/css/loginPage.css?v=4" />
</head>
<body>
    <div class="wrapper">
        <div class="logo">
            <div class="icon">🍜</div>
            <h1>Quản trị hệ thống</h1>
            <p>Cổng quản lý StreetFood</p>
        </div>

        <div class="card">
            <h2>Chào mừng quay lại</h2>
            <p>Vui lòng nhập thông tin để đăng nhập.</p>

            <form id="loginForm" method="post" action="#">
                <div class="field">
                    <label for="txtUsername">Tên đăng nhập</label>
                    <input id="txtUsername" name="username" type="text" placeholder="Tên đăng nhập" autocomplete="username" required />
                </div>

                <div class="field">
                    <label for="txtPassword">Mật khẩu</label>
                    <div class="password-field">
                    <input id="txtPassword" name="password" type="password" placeholder="********" autocomplete="current-password" required />
                    <button type="button" id="togglePasswordBtn" class="password-toggle" aria-label="Show password" title="Show/Hide password" style="display:none;">
                        <svg id="eyeOpenIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg id="eyeClosedIcon" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.7 21.7 0 0 1 5.06-6.94"></path>
                            <path d="M1 1l22 22"></path>
                            <path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.7 21.7 0 0 1-3.2 4.25"></path>
                            <path d="M14.12 14.12a3 3 0 0 1-4.24-4.24"></path>
                        </svg>
                    </button>
                    </div>
                </div>

                <button type="submit">
                    Đăng nhập
                </button>
            </form>
        </div>
    </div>
    <script src="/config.js"></script>
    <script src="/js/Login.js"></script>
</body>
</html>
