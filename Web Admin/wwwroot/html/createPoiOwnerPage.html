<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo POI & tài khoản chủ quán | StreetFood Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/sidebar.css?v=20260406c">
    <style>
        .steps { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .step-pill { padding: 8px 14px; border-radius: 999px; background: #f1f5f9; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; border: 1px solid transparent; }
        .step-pill:hover { border-color: #cbd5e1; }
        .step-pill.done { background: #e0f2fe; color: #0369a1; }
        .step-pill.on { background: var(--accent-bg); color: var(--primary-blue); border-color: #bfdbfe; }
        .form-grid { display: grid; gap: 14px; max-width: 560px; }
        .form-grid label { display: flex; flex-direction: column; gap: 6px; font-size: 13px; font-weight: 600; color: #334155; }
        .form-grid input, .form-grid textarea { padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 14px; }
        .form-grid textarea { min-height: 100px; resize: vertical; }
        .wizard-panel { display: none; }
        .wizard-panel.active { display: block; }
        .nav-row { display: flex; gap: 12px; margin-top: 20px; }
        .sf-modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
            z-index: 9999;
        }
        .sf-modal.open { display: flex; }
        .sf-modal-card {
            width: 100%;
            max-width: 460px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.2);
            overflow: hidden;
        }
        .sf-modal-head {
            padding: 14px 16px;
            border-bottom: 1px solid #e2e8f0;
            font-weight: 800;
            color: #0f172a;
        }
        .sf-modal-body {
            padding: 14px 16px;
            color: #334155;
            line-height: 1.5;
            white-space: pre-line;
        }
        .sf-modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding: 0 16px 16px;
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="logo"><i class="fa-solid fa-utensils"></i><span>StreetFood</span></div>
            <nav class="nav-menu">
                <ul>
                    <li><a href="dashboardPage.html"><i class="fa-solid fa-border-all"></i> Bảng điều khiển</a></li>
                    <li><a href="poiListenStatsPage.html"><i class="fa-solid fa-headphones"></i> Thời lượng nghe</a></li>
                    <li><a href="routeHeatmapPage.html"><i class="fa-solid fa-route"></i> Tuyến & Heatmap</a></li>
                    <li class="active"><a href="createPoiOwnerPage.html"><i class="fa-solid fa-user-plus"></i> Tạo POI & chủ quán</a></li>
                    <li><a href="pendingScriptsPage.html"><i class="fa-solid fa-file-signature"></i> Phê duyệt script</a></li>
                    <li><a href="restaurantOwnersPage.html"><i class="fa-solid fa-user-slash"></i> Chủ cửa hàng</a></li>
                </ul>
            </nav>
        </aside>
        <div class="main-panel">
            <header class="top-header">
                <div class="search-bar"><i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="Tìm nhanh..."></div>
                <div class="header-actions">
                    <a class="btn-logout-admin" href="poiListenStatsPage.html"><i class="fa-solid fa-headphones"></i> Thời lượng nghe</a>
                    <a class="btn-logout-admin" href="loginPage.html" onclick="window.AdminLogout?.(); return false;">
                        <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
                    </a>
                </div>
            </header>
            <div class="page-title-block">
                <h1>Tạo tài khoản chủ quán & POI</h1>
            </div>
            <div class="card-panel">
                <div class="steps">
                    <span class="step-pill on" id="sp1" data-step="1">1 — Tài khoản</span>
                    <span class="step-pill" id="sp2" data-step="2">2 — Cửa hàng</span>
                    <span class="step-pill" id="sp3" data-step="3">3 — Script</span>
                </div>

                <div class="wizard-panel active" id="w1">
                    <div class="form-grid">
                        <label>Username chủ quán<input type="text" id="ownerUsername" placeholder="vd: quan_pho_owner" autocomplete="off"></label>
                        <label>Mật khẩu<input type="password" id="ownerPassword" placeholder="••••••••"></label>
                        <label>Email<input type="email" id="ownerEmail" placeholder="owner@email.com"></label>
                    </div>
                    <div class="nav-row">
                        <button type="button" class="btn-primary" id="to2">Tiếp theo</button>
                    </div>
                </div>

                <div class="wizard-panel" id="w2">
                    <div class="form-grid">
                        <label>Tên POI / cửa hàng<input type="text" id="poiName" placeholder="Quán phở ABC"></label>
                        <label>Mô tả ngắn (tiếng Việt)<textarea id="poiDescription" placeholder="Giới thiệu cho khách..."></textarea></label>
                        <label>Địa chỉ<input type="text" id="address" placeholder="Số nhà, đường, quận..."></label>
                        <label>URL ảnh cửa hàng<input type="url" id="imageUrl" placeholder="https://..."></label>
                        <label>Giờ mở cửa<input type="text" id="openingHours" placeholder="vd: 08:00 - 22:00"></label>
                        <label>Số điện thoại<input type="text" id="phone" placeholder="090..."></label>
                        <label>Vĩ độ<input type="number" step="any" id="lat" value="10.7549"></label>
                        <label>Kinh độ<input type="number" step="any" id="lng" value="106.6666"></label>
                        <label>Bán kính (m)<input type="number" id="radius" value="80"></label>
                    </div>
                    <div class="nav-row">
                        <button type="button" class="btn-outline" id="back1">Quay lại</button>
                        <button type="button" class="btn-primary" id="to3">Tiếp theo</button>
                    </div>
                </div>

                <div class="wizard-panel" id="w3">
                    <div class="form-grid">
                        <label>Script kể chuyện (tiếng Việt)<textarea id="initialScript" placeholder="Có thể để trống và bổ sung sau..."></textarea></label>
                    </div>
                    <div class="nav-row">
                        <button type="button" class="btn-outline" id="back2">Quay lại</button>
                        <button type="button" class="btn-primary" id="submitAll"><i class="fa-solid fa-check"></i> Hoàn tất</button>
                    </div>
                </div>

                <div id="msg" class="err" style="color:#047857;margin-top:16px;display:none;"></div>
                <div id="err" class="err" style="display:none;"></div>
            </div>
        </div>
    </div>
    <div id="sfModal" class="sf-modal" aria-hidden="true">
        <div class="sf-modal-card" role="dialog" aria-modal="true" aria-labelledby="sfModalTitle">
            <div id="sfModalTitle" class="sf-modal-head">Thông báo</div>
            <div id="sfModalBody" class="sf-modal-body"></div>
            <div class="sf-modal-actions">
                <button type="button" id="sfModalClose" class="btn-primary">Đã hiểu</button>
            </div>
        </div>
    </div>
    <script src="/config.js"></script>
    <script src="/js/admin-api.js?v=20260423b"></script>
    <script src="/js/logout.js?v=20260406c"></script>
    <script>
        const sp = [document.getElementById('sp1'), document.getElementById('sp2'), document.getElementById('sp3')];
        const panels = [document.getElementById('w1'), document.getElementById('w2'), document.getElementById('w3')];
        const sfModal = document.getElementById('sfModal');
        const sfModalTitle = document.getElementById('sfModalTitle');
        const sfModalBody = document.getElementById('sfModalBody');
        const sfModalClose = document.getElementById('sfModalClose');
        function showModal(title, body) {
            if (!sfModal || !sfModalTitle || !sfModalBody) return;
            sfModalTitle.textContent = title || 'Thông báo';
            sfModalBody.textContent = body || '';
            sfModal.classList.add('open');
            sfModal.setAttribute('aria-hidden', 'false');
            if (sfModalClose) sfModalClose.focus();
        }
        function hideModal() {
            if (!sfModal) return;
            sfModal.classList.remove('open');
            sfModal.setAttribute('aria-hidden', 'true');
        }
        if (sfModalClose) sfModalClose.onclick = hideModal;
        if (sfModal) {
            sfModal.addEventListener('click', function (ev) {
                if (ev.target === sfModal) hideModal();
            });
        }
        function goStep(n) {
            n = Math.max(1, Math.min(3, n));
            panels.forEach((p, i) => { p.classList.toggle('active', i === n - 1); });
            sp.forEach((s, i) => {
                s.classList.toggle('on', i === n - 1);
                s.classList.toggle('done', i < n - 1);
            });
        }
        function canGoStep2() {
            return !!(document.getElementById('ownerUsername').value.trim() && document.getElementById('ownerPassword').value);
        }
        function canGoStep3() {
            return canGoStep2() && !!document.getElementById('poiName').value.trim();
        }
        sp.forEach(function (el) {
            el.addEventListener('click', function () {
                var step = parseInt(el.getAttribute('data-step'), 10);
                if (step === 2 && !canGoStep2()) return showModal('Thiếu thông tin', 'Nhập username và mật khẩu ở bước 1 trước.');
                if (step === 3 && !canGoStep3()) return showModal('Thiếu thông tin', 'Hoàn tất bước 1 và nhập tên POI ở bước 2 trước.');
                goStep(step);
            });
        });
        document.getElementById('to2').onclick = () => {
            if (!canGoStep2()) return showModal('Thiếu thông tin', 'Nhập username và mật khẩu.');
            goStep(2);
        };
        document.getElementById('back1').onclick = () => goStep(1);
        document.getElementById('to3').onclick = () => {
            if (!document.getElementById('poiName').value.trim()) return showModal('Thiếu thông tin', 'Nhập tên POI.');
            goStep(3);
        };
        document.getElementById('back2').onclick = () => goStep(2);

        document.getElementById('submitAll').onclick = async () => {
            const err = document.getElementById('err');
            const msg = document.getElementById('msg');
            err.textContent = '';
            msg.textContent = '';
            if (err) err.style.display = 'none';
            if (msg) msg.style.display = 'none';
            const body = {
                ownerUsername: document.getElementById('ownerUsername').value.trim(),
                ownerPassword: document.getElementById('ownerPassword').value,
                ownerEmail: document.getElementById('ownerEmail').value.trim() || null,
                poiName: document.getElementById('poiName').value.trim(),
                poiDescription: document.getElementById('poiDescription').value.trim() || null,
                latitude: parseFloat(document.getElementById('lat').value),
                longitude: parseFloat(document.getElementById('lng').value),
                radius: parseInt(document.getElementById('radius').value, 10) || 50,
                address: document.getElementById('address').value.trim() || null,
                imageUrl: document.getElementById('imageUrl').value.trim() || null,
                openingHours: document.getElementById('openingHours').value.trim() || null,
                phone: document.getElementById('phone').value.trim() || null,
                initialScript: document.getElementById('initialScript').value.trim() || null
            };
            try {
                const r = await window.StreetFoodAdmin.createPoiWithOwner(body);
                let popupText = 'Tạo POI và tài khoản chủ quán thành công.\nUserId: ' + r.userId + '\nPoiId: ' + r.poiId;
                if (r.audio && r.audio.queued && r.audio.jobId != null) {
                    popupText += '\n\nTTS: đã xếp hàng nền, job #' + r.audio.jobId;
                } else if (r.audio && r.audio.message) {
                    popupText += '\n\nÂm thanh: ' + r.audio.message;
                }
                showModal('Tạo thành công', popupText);
            } catch (e) {
                showModal('Không thể tạo POI', e.message || String(e));
            }
        };
    </script>
</body>
</html>
